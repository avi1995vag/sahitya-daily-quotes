name: Generate Daily AI Quotes

on:
  schedule:
    - cron: '30 19 * * *' # Triggers automatically every day at 12:30 AM Indian Standard Time (19:00 UTC)
  workflow_dispatch:      # Allows you to trigger the AI generator manually whenever you want

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installs Linux System Shapers
      - name: Install Linux Text-Shaping Libraries (HarfBuzz & Raqm)
        run: |
          sudo apt-get update
          sudo apt-get install -y libraqm-dev libfribidi-dev libharfbuzz-dev libfreetype6-dev libjpeg-dev zlib1g-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # FIXED: Uninstalls the precompiled binary wheel and compiles Pillow from source with native Raqm enabled
      - name: Install Dependencies & Compile Pillow from Source
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip uninstall -y pillow
          pip install --no-binary :all: pillow

      # Generates 30 beautiful posters with zero formatting errors
      - name: Run AI Poster Generator
        run: python generate_poster.py

      - name: Generate Fresh JSON Database
        run: |
          node -e '
          const fs = require("fs");
          const categories = ["daily_special", "inspirational", "life", "love", "motivational"];
          const output = [];
          const owner = "avi1995vag";
          const repo = "sahitya-daily-quotes";
          const branch = "main";
          
          categories.forEach(category => {
            const dir = `images/${category}`;
            if (fs.existsSync(dir)) {
              const files = fs.readdirSync(dir);
              files.forEach(file => {
                if (file !== "keep.txt" && (file.endsWith(".png") || file.endsWith(".jpg") || file.endsWith(".jpeg"))) {
                  output.push({
                    category: category,
                    imageUrl: `https://cdn.jsdelivr.net/gh/${owner}/${repo}@${branch}/${dir}/${file}`
                  });
                }
              });
            }
          });
          
          fs.writeFileSync("quotes.json", JSON.stringify(output, null, 2));
          '

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated daily AI quotes and quotes.json"
          file_pattern: 'images/**/*.png quotes.json logo.png'
